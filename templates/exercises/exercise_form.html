{% extends "base.html" %}

{% block content %}
<h1>Crear exercici</h1>
<form method="post" class="form">
  {% csrf_token %}
  {{ exercise_form.as_p }}
  {{ formset.management_form }}
  <h2>Preguntes</h2>
  {% for form in formset %}
    <fieldset>
      <legend>Pregunta {{ forloop.counter }}</legend>
      {{ form.as_p }}
    </fieldset>
  {% endfor %}
  <button type="submit">Desar exercici</button>
</form>
{% endblock %}
