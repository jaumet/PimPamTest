<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PimPamTest</title>
  <meta name="description" content="Pim Pam Test: exercicis per a estudiants amb premis PimPams per aprendre jugant.">
  <meta name="application-name" content="PimPamTest">
  <meta name="apple-mobile-web-app-title" content="PimPamTest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f6f8fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b1118" media="(prefers-color-scheme: dark)">
  <meta name="msapplication-TileColor" content="#0b1118">
  <link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
  <link rel="icon" href="/static/img/pimpamtest_logo_horizontal.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PimPamTest">
  <meta property="og:title" content="Pim Pam Test">
  <meta property="og:description" content="Fes exercicis i guanya premis PimPams.">
  <meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
  <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}/static/img/pimpamtest_logo_horizontal_fons_fosc.png">
  <meta property="og:image:width" content="1600">
  <meta property="og:image:height" content="700">
  <meta property="og:image:alt" content="Logo de PimPamTest">
  <meta property="og:locale" content="ca_ES">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Pim Pam Test">
  <meta name="twitter:description" content="Fes exercicis i guanya premis PimPams.">
  <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}/static/img/pimpamtest_logo_horizontal_fons_fosc.png">
  <script>
    (function () {
      var theme = localStorage.getItem("pimpamtest-theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/css/site.css">
</head>
<body>
  <header class="topbar">
    <a class="brand logo-brand" href="{% url 'home' %}" aria-label="PimPamTest">
      <img class="logo-light" src="/static/img/pimpamtest_logo_horizontal.svg" alt="PimPamTest">
      <img class="logo-dark" src="/static/img/pimpamtest_logo_horizontal_dark.svg" alt="PimPamTest">
    </a>
    <nav>
      {% if active_student %}
        <span class="nav-user">{{ active_student.username }}</span>
      {% endif %}
      {% if active_student %}
        <a href="{% url 'student_access' %}">Canviar usuari</a>
        <a href="{% url 'student_logout' %}">Sortir</a>
      {% else %}
        <a href="{% url 'student_access' %}">Entrar</a>
      {% endif %}
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Canviar tema">Fosc</button>
    </nav>
  </header>
  <main class="page">
    {% for message in messages %}
      <p class="message">{{ message }}</p>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      var button = document.querySelector("[data-theme-toggle]");
      if (!button) return;

      function currentTheme() {
        return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
      }

      function updateButton() {
        button.textContent = currentTheme() === "dark" ? "Clar" : "Fosc";
      }

      button.addEventListener("click", function () {
        var nextTheme = currentTheme() === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem("pimpamtest-theme", nextTheme);
        updateButton();
      });

      updateButton();
    })();
  </script>
</body>
</html>
